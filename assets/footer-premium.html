<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Mir Orexov — Premium Footer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --wood-dark: #3E2723;
    --wood-darker: #2A1A17;
    --cream: #F5F5DC;
    --cream-soft: #FBF8EE;
    --gold: #D4AF37;
    --gold-light: #F4E5A8;
    --gold-deep: #9C7A1E;
    --text-dark: #2a1c08;
    --text-dim: rgba(42, 28, 8, 0.62);
    --text-cream: rgba(245, 245, 220, 0.78);
    --radius: 22px;
    --font-serif: "Cormorant Garamond", Georgia, serif;
    --font-sans: "Inter", -apple-system, sans-serif;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #e9e2cd;
    font-family: var(--font-sans);
    padding: 48px 16px;
  }

  .pf-footer {
    max-width: 1080px;
    margin: 0 auto;
    position: relative;
  }

  /* ===== Split card ===== */
  .pf-card {
    display: grid;
    grid-template-columns: 1.05fr 1fr;
    background: var(--cream);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow:
      0 30px 60px -20px rgba(40, 25, 10, 0.45),
      0 2px 4px rgba(40, 25, 10, 0.1);
    background-image:
      repeating-linear-gradient(90deg, rgba(0,0,0,0.015) 0px, transparent 2px, transparent 40px),
      radial-gradient(circle at 50px 30px, rgba(212,175,55,0.06) 0, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(212,175,55,0.06) 0, transparent 40%);
  }

  /* ===== Left: wood panel ===== */
  .pf-wood {
    position: relative;
    padding: 56px 48px 64px;
    background:
      linear-gradient(160deg, rgba(255,255,255,0.06), transparent 40%),
      repeating-linear-gradient(100deg,
        rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 2px,
        transparent 2px, transparent 14px),
      linear-gradient(135deg, #4a2f29 0%, var(--wood-dark) 45%, var(--wood-darker) 100%);
    box-shadow: inset 0 0 80px rgba(0,0,0,0.45), inset 0 2px 0 rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 320px;
  }

  .pf-logo-row { display: flex; align-items: center; gap: 14px; }

  .pf-logo-mark {
    width: 52px; height: 52px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold) 55%, var(--gold-deep) 100%);
    box-shadow:
      0 4px 10px rgba(0,0,0,0.5),
      inset 0 1px 1px rgba(255,255,255,0.6),
      inset 0 -2px 3px rgba(0,0,0,0.35);
    flex-shrink: 0;
  }
  .pf-logo-mark img { width: 100%; height: 100%; object-fit: cover; }

  .pf-logo-text strong {
    display: block;
    font-family: var(--font-serif);
    font-weight: 700;
    font-size: 25px;
    letter-spacing: 0.01em;
    color: var(--gold-light);
    text-shadow:
      0 1px 0 rgba(0,0,0,0.6),
      0 0 18px rgba(212,175,55,0.25);
  }
  .pf-logo-text span {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.28em;
    color: rgba(245,245,220,0.55);
    margin-top: 2px;
  }

  .pf-tagline {
    margin: 28px 0 0;
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    line-height: 1.35;
    color: var(--cream-soft);
    max-width: 280px;
  }

  /* ===== 3D gold ribbon ===== */
  .pf-ribbon-wrap {
    position: relative;
    margin: 36px -48px -64px;
    height: 96px;
  }
  .pf-ribbon {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: linear-gradient(180deg, var(--gold-light) 0%, var(--gold) 38%, var(--gold-deep) 75%, #7a5c14 100%);
    box-shadow:
      0 16px 28px -10px rgba(0,0,0,0.55),
      inset 0 2px 0 rgba(255,255,255,0.55),
      inset 0 -3px 6px rgba(0,0,0,0.35);
  }
  .pf-ribbon::before,
  .pf-ribbon::after {
    content: "";
    position: absolute;
    top: 100%;
    width: 0; height: 0;
    border-style: solid;
  }
  .pf-ribbon::before {
    left: 0;
    border-width: 0 14px 14px 0;
    border-color: transparent #5e4510 transparent transparent;
  }
  .pf-ribbon::after {
    right: 0;
    border-width: 0 0 14px 14px;
    border-color: transparent transparent transparent #5e4510;
  }
  .pf-ribbon-small {
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    color: #4a3408;
    text-shadow: 0 1px 0 rgba(255,255,255,0.35);
  }
  .pf-ribbon-big {
    font-family: var(--font-serif);
    font-size: 25px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--wood-darker);
    text-shadow:
      0 1px 0 rgba(255,255,255,0.7),
      0 2px 6px rgba(0,0,0,0.15);
    text-align: center;
    padding: 0 12px;
  }

  /* ===== Right: info panel ===== */
  .pf-info {
    padding: 56px 48px 48px;
    background: linear-gradient(160deg, var(--cream-soft), var(--cream));
    display: flex;
    gap: 56px;
  }

  .pf-col h4 {
    margin: 0 0 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--gold-deep);
  }

  .pf-nav { list-style: none; margin: 0; padding: 0; }
  .pf-nav li { margin-bottom: 13px; }
  .pf-nav a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: color 0.2s ease, padding-left 0.2s ease;
  }
  .pf-nav a:hover { color: var(--gold-deep); padding-left: 3px; }

  .pf-contact-row { display: flex; align-items: center; gap: 13px; margin-bottom: 17px; }
  .pf-contact-row:last-child { margin-bottom: 0; }

  .pf-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(145deg, #fffef8, var(--cream));
    box-shadow:
      0 3px 6px rgba(60, 40, 10, 0.18),
      inset 0 1px 0 rgba(255,255,255,0.9),
      inset 0 -1px 2px rgba(60,40,10,0.08);
    color: var(--gold-deep);
  }
  .pf-icon svg { width: 17px; height: 17px; }

  .pf-contact-row a, .pf-contact-row span.pf-static {
    font-size: 14.5px;
    font-weight: 600;
    color: var(--text-dark);
    text-decoration: none;
  }
  .pf-contact-row a:hover { color: var(--gold-deep); }

  /* ===== Bottom bar ===== */
  .pf-bottom {
    margin-top: 18px;
    text-align: center;
    font-size: 12.5px;
    color: rgba(40, 28, 10, 0.55);
    letter-spacing: 0.01em;
  }

  /* ===== Responsive ===== */
  @media (max-width: 760px) {
    .pf-card { grid-template-columns: 1fr; }
    .pf-wood { padding: 40px 28px 56px; min-height: auto; }
    .pf-ribbon-wrap { margin: 32px -28px -56px; height: 84px; }
    .pf-ribbon-big { font-size: 20px; }
    .pf-info { padding: 48px 28px 36px; flex-direction: column; gap: 28px; }
    .pf-tagline { font-size: 19px; max-width: 100%; }
  }
</style>
</head>
